<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Online Judge</title>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] }, svg: { fontCache: 'global' } };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
<header>
    <div class="header-inner">
        <h1><a href="/">Online Judge</a></h1>
        <nav>
            <a href="/">메인</a>
            <a href="/problems">문제</a>
            <a href="/boards/all">게시판</a>
            <a href="/contests">대회</a>
            <a href="/groups">그룹</a>
            <a href="/submissions">전체 제출</a>
            {% if user %}
                <a href="/my-submissions">내 제출</a>
                <a href="/messages">메세지함</a>
                {% if user.is_admin %}
                    <a href="/admin">관리자</a>
                {% endif %}
                <a class="user-label" href="/users/{{ user.username }}">{{ user.username }}님</a>
                <a href="/logout">로그아웃</a>
            {% else %}
                <a href="/login">로그인</a>
                <a href="/register">회원가입</a>
            {% endif %}
        </nav>
    </div>
</header>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
