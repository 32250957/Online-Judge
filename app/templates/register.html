{% extends "base.html" %}
{% block content %}
<h2>회원가입</h2>
{% if error %}<div class="error-box">{{ error }}</div>{% endif %}
<form action="/register" method="post" class="box small-form">
    <label>아이디</label>
    <input type="text" name="username" minlength="4" maxlength="20" pattern="[A-Za-z0-9`~!@#$%^&*|\'&quot;;:₩\\?]{4,20}" required>
    <p class="hint">아이디는 4~20자, 영어 대소문자/숫자/일부 특수문자만 사용할 수 있습니다.</p>
    <label>비밀번호</label>
    <input type="password" name="password" minlength="8" maxlength="20" pattern="[A-Za-z0-9`~!@#$%^&*|\'&quot;;:₩\\?]{8,20}" required>
    <p class="hint">비밀번호는 8~20자, 영어 대소문자/숫자/일부 특수문자만 사용할 수 있습니다.</p>
    <button type="submit">회원가입</button>
</form>
{% endblock %}
